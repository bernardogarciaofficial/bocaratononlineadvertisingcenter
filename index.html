<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boca Raton Visitor Guide</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="wrap row">

    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>Boca Raton Visitor Guide</h1>
        <div class="sub">
          A free local business video wall for Boca Raton.
        </div>
      </div>
    </div>

    <div class="right">
      <a class="btn" href="#">Send Your Ad (Free)</a>
      <div class="pill">100 SLOTS</div>
    </div>

  </div>
</div>

<!-- 🔥 BIG CENTER LOGO -->
<div class="bigLogo">
  <img src="media/boca-visitor-guide-logo.png">
</div>

<!-- INFO -->
<div class="wrap">
  <div class="info">
    <b>HOW TO ADVERTISE HERE (FREE)</b>
    <ul>
      <li>Video: MP4 / MOV</li>
      <li>Image: JPG / PNG</li>
      <li>Family friendly only</li>
    </ul>
  </div>

  <!-- GRID -->
  <div class="grid">
    <div class="card">EMPTY #001</div>
    <div class="card">EMPTY #002</div>
    <div class="card">EMPTY #003</div>
    <div class="card">EMPTY #004</div>
  </div>
</div>

</body>
</html>
